services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold
      POSTGRES_DB: golddb
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  dragonfly:
    image: registry.dragonflydb.io/dragonfly/dragonfly:v1.26.3

  ws_listener:
    build: .
    command: python /app/ingestors/ws_listener.py
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      WS_TICKERS: "DX-Y.NYB"
    restart: unless-stopped

  predictor:
    build: .
    command: python /app/ml_pipeline/predictor.py
    depends_on:
      - kafka
      - dragonfly
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DRAGONFLY_HOST: dragonfly
      MODEL_PATH: /app/models/dxy_model.pkl
    volumes:
      - model_storage:/app/models
    restart: unless-stopped

  sink:
    build: .
    command: python /app/ml_pipeline/sink.py
    depends_on:
      - kafka
      - dragonfly
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DRAGONFLY_HOST: dragonfly
      POSTGRES_DSN: postgresql://gold:gold@postgres:5432/golddb
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.0
    environment:
      GF_INSTALL_PLUGINS: redis-datasource
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - postgres
      - dragonfly

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_API_URL: http://prefect-server:4200/api

  prefect-worker:
    build: .
    command: >
      sh -c "
        prefect work-pool create --type process default 2>/dev/null;
        prefect worker start --pool default --type process
      "
    volumes:
      - model_storage:/app/models
      - ./ml_pipeline:/app/ml_pipeline
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DRAGONFLY_HOST: dragonfly
      POSTGRES_DSN: postgresql://gold:gold@postgres:5432/golddb
    restart: unless-stopped

  training-flow:
    build: .
    command: python /app/ml_pipeline/training_flow.py
    volumes:
      - model_storage:/app/models
      - ./ml_pipeline:/app/ml_pipeline
    depends_on:
      - prefect-server
      - kafka
      - dragonfly
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DRAGONFLY_HOST: dragonfly
      MODEL_PATH: /app/models/dxy_model.pkl
      DATA_PATH: /app/models/training_data.pkl
    restart: unless-stopped

volumes:
  model_storage:
